services:
  app:
    image: node:20-alpine
    container_name: causalfunnel-analytics-app
    working_dir: /app
    command: >
      sh -c "npm install &&
      npx concurrently
      \"npm run api\"
      \"npx vite --host 0.0.0.0 --port 5173\""
    environment:
      PORT: 4000
      MONGODB_URI: mongodb://mongo:27017/causalfunnel_analytics
      CLIENT_ORIGIN: http://127.0.0.1:5173
    ports:
      - "4000:4000"
      - "5173:5173"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      mongo:
        condition: service_healthy

  mongo:
    image: mongo:7
    container_name: causalfunnel-analytics-mongo
    command: ["mongod", "--quiet", "--bind_ip_all"]
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mongo_data:
  node_modules:
